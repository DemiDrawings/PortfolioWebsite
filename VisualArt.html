  <style>
    /* ─── BASE ─────────────────────────────────── */
    body {
      margin: 0;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    body.page-loaded { opacity: 1; }
    body.page-exit   { opacity: 0; transform: scale(0.98); transition: opacity 0.4s ease, transform 0.4s ease; }

    /* ─── HEADER ───────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      padding: 1rem 9%;
      background: transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      opacity: 0;
      transform: translateY(-14px);
      transition: opacity 0.7s ease 0.3s, transform 0.7s ease 0.3s;
    }
    body.page-loaded header { opacity: 1; transform: translateY(0); }
/* 
    .logo { display: flex; align-items: center;  }
    .logo-icon { width: 100px; height: 100px; object-fit: contain; transition: filter 0.3s; }
    .logo:hover .logo-icon {
      animation: pulse 1s ease-in-out infinite;
      filter: drop-shadow(0 0 10px #00FFB6);
    } */
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

    nav a {
      font-size: 1.8rem;
      color: rgba(255,255,255,0.7);
      margin-left: 4rem;
      font-weight: 500;
      text-decoration: none;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.3s;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: #00FFB6;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s;
    }
    nav a:hover, nav a.active { color: #00FFB6; }
    nav a:hover::after, nav a.active::after { transform: scaleX(1); }

    /* ─── PAGE HERO ─────────────────────────────── */
    .page-hero {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 46vh;
      text-align: center;
      padding: 160px 9% 50px;
      opacity: 0; transform: translateY(18px);
      transition: opacity 0.9s ease 0.5s, transform 0.9s ease 0.5s;
    }
    body.page-loaded .page-hero { opacity: 1; transform: translateY(0); }

    .page-hero .eyebrow {
      font-size: 1.1rem; font-weight: 600;
      letter-spacing: 0.38em; text-transform: uppercase;
      color: #00FFB6;
      text-shadow: 0 0 14px rgba(0,255,182,0.6);
      margin-bottom: 1.4rem;
    }
    .page-hero h1 {
      font-size: clamp(5rem, 9vw, 12rem);
      font-weight: 800; line-height: 1; color: #fff;
    }
    .page-hero h1 span {
      color: #00FFB6;
      text-shadow: 0 0 40px rgba(0,255,182,0.35), 0 0 80px rgba(0,255,182,0.15);
    }
    .page-hero .sub {
      margin-top: 2rem; font-size: 1.2rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .page-hero .sub span { color: #00FFB6; margin: 0 0.8rem; font-size: 0.8rem; }

    /* ─── SECTION LABEL ─────────────────────────── */
    .section-label {
      width: 90%; max-width: 1200px;
      margin: 90px auto 0;
      display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
      border-bottom: 1px solid rgba(0,255,182,0.18);
      padding-bottom: 16px;
      opacity: 0; transform: translateY(18px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .section-label.in-view { opacity: 1; transform: translateY(0); }
    .section-label h2 {
      font-size: clamp(3.2rem, 5vw, 5.5rem);
      font-weight: 800; line-height: 1; color: #fff;
    }
    .section-label h2 span { color: #00FFB6; text-shadow: 0 0 20px rgba(0,255,182,0.3); }
    .label-meta { text-align: right; }
    .label-index {
      display: block; font-size: 1.1rem; font-weight: 700;
      letter-spacing: 0.22em; color: #00FFB6; margin-bottom: 4px;
    }
    .label-meta p {
      font-size: 1.1rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); line-height: 1.8;
    }

    /* ─── MASONRY GRID ──────────────────────────── */
    /*
      Each image sits in a card that is ONLY as tall as the image itself.
      We use a CSS columns layout so images never get cropped or padded.
    */
    .photo-grid {
      width: 90%; max-width: 1200px;
      margin: 32px auto 0;
      columns: 3;
      column-gap: 14px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .photo-grid.in-view { opacity: 1; transform: translateY(0); }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      position: relative;
      
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease,
                  border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .photo-card.in-view { opacity: 1; transform: translateY(0); }

    /* stagger */
    .photo-card:nth-child(1){transition-delay:.03s}
    .photo-card:nth-child(2){transition-delay:.08s}
    .photo-card:nth-child(3){transition-delay:.13s}
    .photo-card:nth-child(4){transition-delay:.18s}
    .photo-card:nth-child(5){transition-delay:.23s}
    .photo-card:nth-child(6){transition-delay:.28s}
    .photo-card:nth-child(7){transition-delay:.33s}
    .photo-card:nth-child(8){transition-delay:.38s}
    .photo-card:nth-child(9){transition-delay:.43s}

    .photo-card:hover {
      border-color: rgba(0,255,182,0.4);
      box-shadow: 0 0 0 1px rgba(0,255,182,0.15),
                  0 0 28px rgba(0,255,182,0.1),
                  0 16px 40px rgba(0,0,0,0.55);
      z-index: 2;
    }

    .photo-card img {
      width: 100%;
      height: auto;          /* ← key: natural aspect ratio, zero crop */
      display: block;
      transition: transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.4s ease;
      opacity: 0;
    }
    .photo-card img.loaded { opacity: 1; }
    .photo-card:hover img  { transform: scale(1.04); }

    /* zoom icon */
    .zoom-hint {
      position: absolute; bottom: 10px; right: 10px;
      width: 26px; height: 26px;
      border: 1.5px solid rgba(0,255,182,0.6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.5);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; z-index: 3;
    }
    .zoom-hint svg { width: 11px; height: 11px; stroke: #00FFB6; fill: none; stroke-width: 1.8; }
    .photo-card:hover .zoom-hint { opacity: 1; transform: scale(1); }

  footer {
      text-align: center;
      font-size: 1.2rem;
      color: #555;
      padding: 20px;
      position: relative;
      width: 100%;
    }
    /* ─── LIGHTBOX ──────────────────────────────── */
    /* Mounted on <html> so body transforms never affect it */
    #lb-portal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: rgba(4,4,10,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 10000;
    }
    #lb-portal.active { opacity: 1; pointer-events: auto; }

    #lb-portal .lightbox-inner {
      position: relative;
      max-width: 90vw; max-height: 90vh;
      display: flex; align-items: center; justify-content: center;
    }
    #lb-portal .lightbox-inner img {
      max-width: 90vw; max-height: 90vh;
      width: auto; height: auto;
      border-radius: 14px;
      box-shadow: 0 0 60px rgba(0,255,182,0.1), 0 30px 80px rgba(0,0,0,0.8);
      transform: scale(0.92); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
      pointer-events: none;
    }
    #lb-portal.active .lightbox-inner img { transform: scale(1); opacity: 1; }

    #lb-portal .lb-close {
      position: absolute; top: -44px; right: 0;
      width: 36px; height: 36px;
      border: 1.5px solid rgba(0,255,182,0.4); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    #lb-portal .lb-close:hover { border-color: #00FFB6; background: rgba(0,255,182,0.08); box-shadow: 0 0 14px rgba(0,255,182,0.3); }
    #lb-portal .lb-close svg { width: 14px; height: 14px; stroke: #00FFB6; fill: none; stroke-width: 1.8; }

    /* ─── RESPONSIVE ────────────────────────────── */
    @media (max-width: 900px)  { .photo-grid { columns: 2; } }
    @media (max-width: 500px)  { .photo-grid { columns: 1; } .section-label { flex-direction: column; align-items: flex-start; } .label-meta { text-align: left; } }
  </style>

  <!-- Lightbox is injected onto <html> via JS to escape body transform -->

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    requestAnimationFrame(() => {
      document.body.classList.add("page-loaded");

      // ── Scroll reveal ──
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in-view'); });
      }, { threshold: 0.05 });

      document.querySelectorAll('.section-label, .photo-grid, .photo-card').forEach(el => io.observe(el));

      // ── Image fade-in ──
      document.querySelectorAll('.photo-card img').forEach(img => {
        if (img.complete) img.classList.add('loaded');
        else img.addEventListener('load', () => img.classList.add('loaded'));
      });

      // ── Lightbox (portaled onto <html> to escape body transforms) ──
      const portal = document.createElement('div');
      portal.id = 'lb-portal';
      portal.innerHTML = `
        <div class="lightbox-inner">
          <div class="lb-close" id="lbClose">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"/></svg>
          </div>
          <img src="" alt="" id="lightbox-img">
        </div>`;
      document.documentElement.appendChild(portal);

      const lbImg   = portal.querySelector('#lightbox-img');
      const lbClose = portal.querySelector('#lbClose');

     document.querySelectorAll('.photo-card img').forEach(img => {
  img.style.cursor = 'pointer';
  img.addEventListener('click', (e) => {
    if (img.closest('a')) return; // skip lightbox if card is linked
    lbImg.src = img.src;
    portal.classList.add('active');
  });
});

      const closeLB = () => {
        portal.classList.remove('active');
        setTimeout(() => { lbImg.src = ''; }, 320);
      };

      lbClose.addEventListener('click', e => { e.stopPropagation(); closeLB(); });
      portal.addEventListener('click', closeLB);
      portal.querySelector('.lightbox-inner').addEventListener('click', e => e.stopPropagation());
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

      // ── Page transitions ──
      document.querySelectorAll("a[href]").forEach(link => {
        link.addEventListener("click", e => {
          const url = link.getAttribute("href");
          if (url.startsWith("#")) return;
          e.preventDefault();
          document.body.classList.add("page-exit");
          setTimeout(() => window.location.href = url, 420);
        });
      });
    });
  });

  
  </script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.getElementById('hamburger');
    const mainNav   = document.getElementById('mainNav');
    if (!hamburger || !mainNav) return;
    hamburger.addEventListener('click', e => {
      e.stopPropagation();
      if (mainNav.classList.contains('active')) closeMenu();
      else { document.body.style.overflow = 'hidden'; hamburger.classList.add('active'); mainNav.classList.add('active'); }
    });
    function closeMenu() { hamburger.classList.remove('active'); mainNav.classList.remove('active'); document.body.style.overflow = ''; }
    mainNav.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
    mainNav.addEventListener('click', e => { if (e.target === mainNav) closeMenu(); });
  });
  </script>
